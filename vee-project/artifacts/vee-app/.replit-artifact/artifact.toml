kind = "mobile"
previewPath = "/"
title = "Vee - Voice Room"
version = "1.0.0"
id = "artifacts/vee-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24872

[services.development]
run = "pnpm --filter @workspace/vee-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vee-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vee-app", "run", "serve" ]

[services.env]
PORT = "24872"
BASE_PATH = "/"
